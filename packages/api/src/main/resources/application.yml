server:
  port: 8080

spring:
  application:
    name: creatorx-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
    path: /api/docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

creatorx:
  jwt:
    secret: ${JWT_SECRET}
    expiry-ms: ${JWT_EXPIRY_MS}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS}
  supabase:
    url: ${SUPABASE_URL}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
    storage:
      bucket-kyc: ${SUPABASE_STORAGE_BUCKET_KYC}
      bucket-deliverables: ${SUPABASE_STORAGE_BUCKET_DELIVERABLES}
      bucket-products: ${SUPABASE_STORAGE_BUCKET_PRODUCTS}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID}
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON}
  ai-scoring:
    api-url: ${AI_SCORING_API_URL}
    api-key: ${AI_SCORING_API_KEY}
  platform:
    fee-percent: ${PLATFORM_FEE_PERCENT}
    brand-portal-url: ${BRAND_PORTAL_URL}
    admin-dashboard-url: ${ADMIN_DASHBOARD_URL}
    creator-app-scheme: ${CREATOR_APP_SCHEME}
